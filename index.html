<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- displays site properly based on user's device -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
      name="description"
      content="Social links profile card for Joke Wizzo, front-end developer."
    />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Joke Wizzo | Social Links</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="card">
      <img
        class="card__avatar"
        src="assets/images/Joke-wizzo.jpg"
        alt="Joke Wizzo"
        width="88"
        height="88"
      />
      <div class="card__identity">
        <h1 class="card__name">Joke Wizzo</h1>
        <p class="card__location">London, United Kingdom</p>
      </div>
      <p class="card__bio">&quot;Front-end developer and Data Scientist&quot;</p>
      <nav class="card__links" aria-label="Social links">
        <ul>
          <li>
            <a
              href="https://github.com/Kuach-joke"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >GitHub</a
            >
          </li>
          <li>
            <a
              href="https://x.com/stillwizzo"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >Twitter</a
            >
          </li>
          <li>
            <a
              href="https://www.linkedin.com/in/kuach-john/"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >LinkedIn</a
            >
          </li>
          <li>
            <a
              href="https://www.instagram.com/still.wizzo?igsh=MXFwZmhseTRrcWtsNg%3D%3D&utm_source=qr"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >Instagram</a
            >
          </li>
          <li>
            <a
              href="https://www.frontendmentor.io/profile/Kuach-joke"
              class="link-btn"
              target="_blank"
              rel="noopener noreferrer"
              >Frontend Mentor</a
            >
          </li>
        </ul>
      </nav>
    </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://wizzoviz.tech/">Joke Wizzo</a>.
  </footer>
</body>
</html>
